[keyboard]
name = "smartremote"
product_name = "smartremote"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "rmk"
chip = "nrf52840"

# -------------------------------------------------------------
# Physical matrix wiring
# -------------------------------------------------------------
# NOTE on naming: current RMK (v0.8+/main) uses `row_pins` / `col_pins`.
#   Your input_pins  (行 / ROW) -> row_pins
#   Your output_pins (列 / COL) -> col_pins
# (Older RMK v0.7 used `input_pins` / `output_pins` instead.)
[matrix]
row_pins = ["P0_20", "P0_22", "P0_24"]   # ROW: D3, D4, D5
col_pins = ["P1_11", "P0_10", "P0_09"]   # COL: D16, D10, D9-area pins
# col2row is the default — diodes point COL -> ROW — so no `row2col` needed.
# matrix_type = "normal"   # default, can be omitted

# -------------------------------------------------------------
# Layout + default keymap
# -------------------------------------------------------------
[layout]
rows = 3
cols = 3
# (row, col) order in which the keys below are listed. Zero-based.
layers = 4
keymap = [
    # Layer 0 (基础层)
    [
        ["AudioVolUp", "AudioVolDown", "Right"],
        ["MouseWheelUp", "Left", "MouseWheelDown"],
        ["PageUp", "Down", "PageDown"],
    ],
    # Layer 1
    [
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
    ],
    # Layer 2 (新增)
    [
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
    ],
    # Layer 3 (新增)
    [
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"],
    ],
]
[rmk]
split_central_sleep_timeout_seconds = 60

# -------------------------------------------------------------
# Bluetooth
# -------------------------------------------------------------
[ble]
enabled = true
# vddh has an internal voltage divider
battery_adc_pin = "vddh"
# Or
# battery_adc_pin = "P0_04"
# adc_divider_measured = 2000
# adc_divider_total = 2806

# charge_state.pin = "P0_25"
# charge_state.low_active = false
# charge_led.pin = "P0_29"
# charge_led.low_active = false
